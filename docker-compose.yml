version: '3.8'

services:
  # ==================== BACKEND ====================
  backend:
    build: ./Backend/RpgBackend
    container_name: rpg-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/rpg
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"
      SPRING_CACHE_TYPE: simple
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rpg-network

  # ==================== FRONTEND ====================
  frontend:
    build: ./rpg
    container_name: rpg-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - rpg-network

  # ==================== POSTGRESQL ====================
  db:
    image: postgres:16-alpine
    container_name: rpg-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rpg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rpg"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rpg-network

  # ==================== REDIS ====================
  redis:
    image: redis:7-alpine
    container_name: rpg-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - rpg-network

volumes:
  postgres_data:
  redis_data:

networks:
  rpg-network:
    driver: bridge