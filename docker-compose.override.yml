version: '3.8'

services:
  backend:
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    volumes:
      - ./Backend/RpgBackend:/app
      - ~/.m2:/root/.m2
    ports:
      - "8080:8080"
      - "35729:35729" # Live reload pour Spring Boot DevTools

  frontend:
    volumes:
      - ./rpg:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  lowcode-db:
    ports:
      - "3000:3000"
