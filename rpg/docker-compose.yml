version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rpg-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
    # Pour le développement, vous pouvez décommenter les volumes
    # volumes:
    #   - .:/app
    #   - /app/node_modules