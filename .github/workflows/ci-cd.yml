name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rpg
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build backend
        working-directory: ./Backend/RpgBackend
        run: mvn -B package -DskipTests

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: ./rpg
        run: npm install

      - name: Build frontend
        working-directory: ./rpg
        run: npm run build

      - name: Run backend tests
        working-directory: ./Backend/RpgBackend
        run: mvn test

      - name: Run frontend tests
        working-directory: ./rpg
        run: npm run lint

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push backend
        working-directory: ./Backend/RpgBackend
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/rpg-backend:latest .
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/rpg-backend:latest

      - name: Build and push frontend
        working-directory: ./rpg
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/rpg-frontend:latest .
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/rpg-frontend:latest

      - name: Deploy to server
        run: |
          echo "Deploying to production server..."
          # Add your deployment commands here (e.g., SSH, Kubernetes, etc.)
